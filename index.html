<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronan Sullivan — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f6f0; /* Soft, warm cinematic poster off-white */
    --dark: #1a1a1a; /* Rich, dark off-black */
    --accent: #c5a880; /* Muted gold / sand editorial accent */
    --serif: 'Playfair Display', serif;
    --sans: 'DM Sans', sans-serif;
    --ease: cubic-bezier(0.25, 1, 0.5, 1);
  }

  body {
    background-color: var(--bg);
    color: var(--dark);
    font-family: var(--sans);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* CINEMATIC POSTER FRAME */
  .portfolio-canvas {
    width: 90vw;
    max-width: 1200px;
    height: 85vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
    padding: 40px 0;
  }

  /* HEADER */
  .header {
    text-align: center;
    border-bottom: 1px solid rgba(26, 26, 26, 0.1);
    padding-bottom: 30px;
  }

  .title {
    font-family: var(--serif);
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    text-transform: capitalize;
  }

  .title span {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: rgba(26, 26, 26, 0.5);
    margin-top: 10px;
  }

  /* MAIN CONTENT AREA with cinematic blur-in transition */
  .main-content {
    position: relative;
    overflow: hidden;
    margin: 40px 0;
  }

  .page {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    opacity: 0;
    filter: blur(20px);
    transform: scale(0.98);
    transition: opacity 0.8s var(--ease), filter 0.8s var(--ease), transform 0.8s var(--ease);
    pointer-events: none;
  }

  .page.active {
    opacity: 1;
    filter: blur(0px);
    transform: scale(1);
    pointer-events: auto;
  }

  /* PAGE: BIO/ABOUT */
  .bio-text {
    font-family: var(--serif);
    font-size: 24px;
    line-height: 1.6;
    max-width: 750px;
    color: var(--dark);
  }

  /* PAGE: CATEGORIES */
  .grid-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    width: 100%;
    max-width: 900px;
  }

  .category-card {
    background: none;
    border: none;
    text-align: left;
    cursor: pointer;
    padding: 20px;
    border-bottom: 1px solid rgba(26, 26, 26, 0.15);
    transition: border-color 0.4s ease, transform 0.4s var(--ease);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 140px;
  }

  .category-card:hover {
    border-color: var(--dark);
    transform: translateY(-5px);
  }

  .card-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .card-title {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 700;
    color: var(--dark);
    margin-top: auto;
  }

  /* OVERLAY PANEL */
  .overlay-panel {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: var(--bg);
    display: flex;
    flex-direction: column;
    justify(center);
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transform: translateY(15px);
    transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
    z-index: 5;
  }

  .overlay-panel.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .panel-title {
    font-family: var(--serif);
    font-size: 32px;
    margin-bottom: 20px;
  }

  .panel-links {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
  }

  .editorial-link {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dark);
    text-decoration: none;
    position: relative;
    padding-bottom: 5px;
  }

  .editorial-link::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 1px;
    background-color: var(--accent);
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.4s var(--ease);
  }

  .editorial-link:hover::after {
    transform: scaleX(1);
    transform-origin: left;
  }

  .back-btn {
    margin-top: 40px;
    background: none;
    border: none;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(26, 26, 26, 0.4);
    cursor: pointer;
    transition: color 0.3s ease;
  }

  .back-btn:hover { color: var(--dark); }

  /* FOOTER NAVIGATION */
  .footer {
    display: flex;
    justify-content: center;
    gap: 40px;
    border-top: 1px solid rgba(26, 26, 26, 0.1);
    padding-top: 30px;
  }

  .nav-btn {
    background: none;
    border: none;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(26, 26, 26, 0.4);
    cursor: pointer;
    position: relative;
    transition: color 0.3s ease;
    padding-bottom: 5px;
  }

  .
